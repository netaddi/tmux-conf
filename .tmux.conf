set -g default-terminal "tmux-256color"
# 同时加上这行，让外部真彩色正常工作
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 20000000              # 增加历史回滚行数
set -g base-index 0                        # 窗口编号从 0 开始
setw -g pane-base-index 0                  # 面板编号也从 0 开始
set -s escape-time 0                       # 解决 Vim 中按 Esc 延迟问题

# ================================================================
# 2. 继承你的 Screen 习惯 (The Soul)
# ================================================================

# 修改 Prefix 为 Ctrl-j (对应 escape ^Jj)
unbind C-b
set -g prefix C-j
bind C-j send-prefix

# 对应 bind 'K' kill
bind K confirm-before -p "Kill window #W? (y/n)" kill-window
bind k confirm-before -p "Kill window #W? (y/n)" kill-window
bind C-k confirm-before -p "Kill window #W? (y/n)" kill-window

# 对应 bind '}' history (tmux 里的历史查看叫做 copy-mode)
bind '}' copy-mode
bind '[' copy-mode
bind C-] copy-mode
bind ']' copy-mode


bind A command-prompt -I "#W" "rename-window '%%'"

# ================================================================
# 3. 状态栏复刻 (更漂亮的 Hardstatus)
# ================================================================
set -g status-style "bg=colour235,fg=colour10" # 深灰色背景，绿色文字
set -g status-left-length 20
set -g status-left "[#S] "                      # 显示会话名称

# 窗口列表显示 (复刻 %-w%n %t%+w)
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=colour6,fg=colour15,bold] #I:#W(#{window_panes}) #{pane_current_command}#{?window_zoomed_flag, [Z],} "

# 右侧信息 (复刻 %H %Y/%m/%d %c)
set -g status-right-length 60
set -g status-right "#[fg=colour10]%H:%M:%S #[fg=colour11]%Y/%m/%d #[fg=white,bold]%H"


# === 兼容 Screen 的“快手”操作 (不松开 Ctrl 也能生效) ===

# 允许 Ctrl-j 后接着按 Ctrl-n (下一个窗口)
bind C-n next-window

# 允许 Ctrl-j 后接着按 Ctrl-p (上一个窗口)
bind C-p previous-window

# 允许 Ctrl-j 后接着按 Ctrl-c (新建窗口)
bind C-c new-window

# 允许 Ctrl-j 后接着按 Ctrl-d (脱离会话)
bind d detach
bind C-d detach

bind C-o select-pane -t :.+

setw -g mode-keys emacs


bind-key -T copy-mode u send-keys -X page-up
bind-key -T copy-mode C-u send-keys -X page-up
bind-key -T copy-mode d send-keys -X page-down
bind-key -T copy-mode C-d send-keys -X page-down

bind u copy-mode \; send-keys -X page-up 
bind C-u copy-mode \; send-keys -X page-up 

set -g allow-rename off


bind - split-window -v
bind | split-window -h
bind \\ split-window -h

bind i select-pane -U 
bind l select-pane -R
bind tab select-pane -U 
bind C-l select-pane -R

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

set -g pane-border-status top
set -g pane-border-format " #P: #{pane_title} "

bind t command-prompt -p "pane title:" "select-pane -T '%%'"
bind ` split-window -v \; split-window -h \; select-pane -t 0 \; split-window -h

bind / copy-mode \; send-keys C-s 
bind ? copy-mode \; send-keys C-r

bind C-s copy-mode \; send-keys C-s
bind C-r copy-mode \; send-keys C-r

bind C-z resize-pane -Z
bind v copy-mode
bind C-v copy-mode
bind-key -T copy-mode v send-keys -X begin-selection
bind-key -T copy-mode C-v send-keys -X begin-selection
bind-key -T copy-mode Enter send-keys -X copy-selection-and-cancel

bind -n F1 select-pane -t 0
bind -n F2 select-pane -t 1
bind -n F3 select-pane -t 2
bind -n F4 select-pane -t 3

bind F1 select-pane -t 0
bind F2 select-pane -t 1
bind F3 select-pane -t 2
bind F4 select-pane -t 3

